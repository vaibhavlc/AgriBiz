<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f8fafc" />
    <script>
      (function() {
        try {
          const localSettings = localStorage.getItem('agribiz_settings');
          let theme = 'system';
          if (localSettings) {
            theme = JSON.parse(localSettings).theme || 'system';
          }
          let active = 'light';
          if (theme === 'system') {
            active = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          } else {
            active = theme;
          }
          const themeColor = active === 'dark' ? '#0b0f19' : '#f8fafc';
          const metaTag = document.querySelector('meta[name="theme-color"]');
          if (metaTag) metaTag.setAttribute('content', themeColor);
        } catch (e) {
          // ignore
        }
      })();
    </script>
    <title>Daivyog – Agricultural Dealer Management System</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('ServiceWorker registered'))
            .catch(err => console.log('ServiceWorker registration failed', err));
        });
      }
    </script>
  </body>
</html>
